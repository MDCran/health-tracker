spring:
  datasource:
    url: jdbc:${DATABASE_URL}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://healthtracker.mdcran.com}

google:
  redirect-uri: ${GOOGLE_REDIRECT_URI:https://api.healthtracker.mdcran.com/api/v1/integrations/google/callback}
