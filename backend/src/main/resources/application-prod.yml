server:
  port: ${PORT:10000}

spring:
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}                                                                              
    username: ${DB_USER:postgres}                                                                                                                             
    password: ${DB_PASSWORD}  
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://healthtracker.mdcran.com}

google:
  redirect-uri: ${GOOGLE_REDIRECT_URI:https://api.healthtracker.mdcran.com/api/v1/integrations/google/callback}
